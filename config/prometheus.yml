global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: hebutguide
    environment: production

scrape_configs:
  - job_name: hebutguide-app
    static_configs:
      - targets:
          - hebutguide:8000
        labels:
          service: hebutguide
    scrape_interval: 10s
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090


